name: Deploy to GitHub Pages

on:

  push:
    branches: [main]


  schedule:
    - cron: "*/15 * * * *"


  workflow_dispatch:


permissions:
  contents: write  
  pages: write
  id-token: write


concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
   
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive        
          fetch-depth: 0                 

  
      - name: Update Obsidian vault submodule to latest remote commit
        run: |
          git submodule update --remote --merge src/content/posts
          echo "Submodule now at: $(git -C src/content/posts rev-parse --short HEAD)"

  

      - name: Copy PDFs from vault to public/ and remove originals
        run: |
          set -euo pipefail

          SRC="src/content/posts"
          DEST="public/assets"


          find "$SRC" -type f -name "*.pdf" -path "*-assets/*" | while read -r pdf; do


            rel="${pdf#$SRC/}"

            target="$DEST/$rel"
            mkdir -p "$(dirname "$target")"
            cp "$pdf" "$target"
            echo "Copied  $pdf  →  $target"

     
            rm "$pdf"
            echo "Removed $pdf"
          done

          echo "PDF copy/clean complete."

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      
      - name: Install dependencies
        run: npm ci

    
      - name: Build
        run: npm run build
        env:
   
          SITE: https://mrsmusogi.github.io
          BASE: /miranda-w-mungai
          NODE_ENV: production

  
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist          

     
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
